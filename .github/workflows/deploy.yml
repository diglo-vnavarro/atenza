name: Deploy

# Despliega a Firebase (hosting + reglas de Firestore/Storage) al hacer push a main.
# Autenticación sin claves: Workload Identity Federation (OIDC de GitHub → GCP).
# Requiere los secrets listados en infra/README.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # necesario para Workload Identity Federation

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests
        run: npm test

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        run: npm run build

      # Deploy automático desactivado por defecto: el SA por WIF da 400
      # "project not found" en las APIs de Firebase (pendiente de afinar el SA).
      # Mientras, el deploy se hace manual con ADC de owner (ver infra/README).
      # Actívalo poniendo la variable de repo CI_DEPLOY=true.
      - name: Autenticación GCP (WIF)
        if: ${{ vars.CI_DEPLOY == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Deploy a Firebase
        if: ${{ vars.CI_DEPLOY == 'true' }}
        env:
          GOOGLE_CLOUD_QUOTA_PROJECT: diglo-desk-pd
        run: >
          npx --yes firebase-tools deploy
          --only hosting,firestore:rules,storage
          --project diglo-desk-pd
          --non-interactive
